name: iOS Deploy to App Store

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Patch bundle ID and team in Xcode project
        run: |
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.blessingcommunity.app;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = ""/DEVELOPMENT_TEAM = MJW2ZG6ZLH/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = ;/DEVELOPMENT_TEAM = MJW2ZG6ZLH;/g' ios/App/App.xcodeproj/project.pbxproj

      - name: Import code signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          PRIVATE_KEY_BASE64: ${{ secrets.PRIVATE_KEY_BASE64 }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode cert and key
          echo $CERTIFICATE_BASE64 | base64 --decode > $RUNNER_TEMP/cert.cer
          echo $PRIVATE_KEY_BASE64 | base64 --decode > $RUNNER_TEMP/private.key

          # Combine into P12 using OpenSSL
          openssl pkcs12 -export \
            -inkey $RUNNER_TEMP/private.key \
            -in $RUNNER_TEMP/cert.cer \
            -out $RUNNER_TEMP/cert.p12 \
            -passout pass:temp123

          # Create and configure keychain
          security create-keychain -p "temp123" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "temp123" $KEYCHAIN_PATH

          # Import P12 into keychain
          security import $RUNNER_TEMP/cert.p12 -k $KEYCHAIN_PATH -P "temp123" -T /usr/bin/codesign
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "temp123" $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $PROVISIONING_PROFILE_BASE64 | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/BlessingCommunity_AppStore.mobileprovision

      - name: Build and archive
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="BlessingCommunity_AppStore" \
            DEVELOPMENT_TEAM=MJW2ZG6ZLH \
            archive

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>MJW2ZG6ZLH</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.blessingcommunity.app</key>
              <string>BlessingCommunity_AppStore</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to App Store Connect
        env:
          P8_KEY: ${{ secrets.P8_KEY }}
          P8_KEY_ID: ${{ secrets.P8_KEY_ID }}
          P8_ISSUER_ID: ${{ secrets.P8_ISSUER_ID }}
        run: |
          echo "$P8_KEY" > $RUNNER_TEMP/auth.p8
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/App.ipa \
            --apiKey $P8_KEY_ID \
            --apiIssuer $P8_ISSUER_ID \
            --apiPrivateKey $RUNNER_TEMP/auth.p8